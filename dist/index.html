<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gotas de Cuidado: Monitoramento de Crianças e Adolescentes com Diabetes e Anemia Falciforme</title>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var verifyToken = params.get('verify');
        var authToken = params.get('token');
        var pbUrl = 'https://centraldedados.dev.br';

        // Limpa a URL imediatamente
        if (verifyToken || authToken) {
          window.history.replaceState(null, '', window.location.pathname);
        }

        // Reset / Email Change: salva token para React
        if (authToken) {
          var actionPath = window.location.pathname.toLowerCase();
          window.__authAction = actionPath.indexOf('/confirm-email-change') !== -1
            ? 'confirm_email_change' : 'reset_password';
          window.__authToken = authToken;
        }

        // Verificação: fetch direto ao PocketBase
        function doVerify() {
          console.log('[Verify] Token capturado...');

          // Mostra loading
          var loading = document.createElement('div');
          loading.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f8fafc;z-index:9999;font-family:system-ui';
          loading.innerHTML = '<div style="text-align:center"><div style="width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#9f1239;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 16px"></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style><p style="color:#64748b;font-size:14px">Confirmando email...</p></div>';
          document.body.appendChild(loading);

          fetch(pbUrl + '/api/collections/gotas_de_cuidado_users/confirm-verification', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
            body: 'token=' + encodeURIComponent(verifyToken),
          }).then(function(resp) {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.json();
          }).then(function(data) {
            console.log('[Verify] Sucesso:', data);
            window.location.href = window.location.pathname + '?verified=1';
          }).catch(function(err) {
            console.error('[Verify] Falha:', err.message);
            window.location.href = window.location.pathname + '?verify_error=1';
          });
        }

        if (verifyToken) {
          if (document.body) {
            doVerify();
          } else {
            document.addEventListener('DOMContentLoaded', doVerify);
          }
        }
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-CprIOOdr.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-75iFl3k1.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
